    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #F9F8F4;
            color: #2D2D2D;
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .glass-header {
            background: rgba(249, 248, 244, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #F9F8F4; 
        }
        ::-webkit-scrollbar-thumb {
            background: #D1C7B7; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #B0A695; 
        }

        .tag {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 9999px;
            background-color: #F3F4F6;
            color: #4B5563;
            border: 1px solid #E5E7EB;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #D4A017;
            box-shadow: 0 0 0 3px rgba(212, 160, 23, 0.1);
        }

        /* 模态框动画 */
        .modal-overlay {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            transform: scale(0.95) translateY(20px);
            transition: all 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .info-label {
            font-size: 0.75rem;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-size: 0.95rem;
            color: #1F2937;
            font-weight: 500;
        }

        .social-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .social-icon:hover {
            transform: translateY(-2px);
        }

        .social-icon img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
    </style>

                qq: `<img src="${QQ_ICON}" alt="QQ" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%2312B7F5%22><path d=%22M12 2C6.5 2 2 6.5 2 12c0 4.4 2.9 8.1 6.9 9.5.5.1.7-.2.7-.5v-1.8c-2.8.6-3.4-1.2-3.4-1.2-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.5 2.3 1.1 2.9.8.1-.6.3-1.1.6-1.3-2.2-.3-4.5-1.1-4.5-4.9 0-1.1.4-2.1 1-2.8-.3-.9-.9-2.8.2-2.8 0 0 .9-.3 2.9 1.1.8-.2 1.7-.3 2.6-.3s1.8.1 2.6.3c2-1.4 2.9-1.1 2.9-1.1 1.1 0 .5 1.9.2 2.8.6.7 1 1.7 1 2.8 0 3.8-2.3 4.6-4.5 4.9.3.3.6.8.6 1.6v2.4c0 .3.2.6.7.5 4-1.4 6.9-5.1 6.9-9.5C22 6.5 17.5 2 12 2z%22/></svg>'">`,
                email: `<img src="${EMAIL_ICON}" alt="邮箱" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%236B7280%22 stroke-width=%222%22><path d=%22M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z%22/></svg>'">`,
                other: `<img src="${OTHER_ICON}" alt="其他" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%236B7280%22 stroke-width=%222%22><path d=%22M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9%22/></svg>'">`
            };
            return icons[type] || icons.other;
        }

        function renderStudents() {
            grid.innerHTML = '';
            
            const filteredData = studentsData.filter(student => {
                const matchesCategory = currentFilter === 'all' || student.category === currentFilter;
                const matchesSearch = student.name.includes(searchQuery) || student.role.includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            countDisplay.textContent = `共 ${filteredData.length} 人`;

            if (filteredData.length === 0) {
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                filteredData.forEach(student => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-xl p-6 border border-gray-100 shadow-sm card-hover flex flex-col items-center text-center relative overflow-hidden group cursor-pointer';
                    card.onclick = () => openModal(student);
                    
                    const avatarUrl = `${GITHUB_BASE_URL}${student.id}.png`;

                    card.innerHTML = `
                        <div class="absolute top-0 right-0 w-24 h-24 bg-yellow-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
                        <div class="relative z-10 w-20 h-20 mb-4 rounded-full overflow-hidden border-2 border-white shadow-md bg-gray-100">
                            <img 
                                src="${avatarUrl}" 
                                alt="${student.name}" 
                                class="w-full h-full object-cover"
                                onerror="this.onerror=null; this.src='${DEFAULT_AVATAR}';"
                            >
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 mb-1">${student.name}</h3>
                        <span class="tag mb-4 bg-yellow-50 text-yellow-700 border-yellow-100">${student.role}</span>
                        <p class="text-gray-500 text-sm italic leading-relaxed mb-4">"${student.quote}"</p>
                        <div class="mt-auto w-full pt-4 border-t border-gray-50 flex justify-between items-center text-xs text-gray-400">
                            <span>ID: 202022${String(student.id).padStart(2, '0')}</span>
                            <span class="group-hover:text-yellow-600 transition-colors">查看详情 &rarr;</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function openModal(student) {
            const avatarUrl = `${GITHUB_BASE_URL}${student.id}.png`;
            
            modalContent.innerHTML = `
                <!-- 个人信息头部 -->
                <div class="flex items-center gap-6 mb-8 pb-6 border-b border-gray-100">
                    <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white shadow-lg bg-gray-100 flex-shrink-0">
                        <img 
                            src="${avatarUrl}" 
                            alt="${student.name}" 
                            class="w-full h-full object-cover"
                            onerror="this.onerror=null; this.src='${DEFAULT_AVATAR}';"
                        >
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-gray-900 mb-2">${student.name}</h2>
                        <div class="flex items-center gap-3 text-sm text-gray-500">
                            <span class="tag bg-yellow-50 text-yellow-700 border-yellow-100">${student.role}</span>
                            <span>ID: 202022${String(student.id).padStart(2, '0')}</span>
                        </div>
                    </div>
                </div>

                <!-- 基本信息网格 -->
                <div class="grid grid-cols-2 gap-6 mb-8">
                    <div>
                        <p class="info-label">性别</p>
                        <p class="info-value">${student.gender}</p>
                    </div>
                    <div>
                        <p class="info-label">出生日期</p>
                        <p class="info-value">${student.birthDate}</p>
                    </div>
                    <div class="col-span-2">
                        <p class="info-label">性格特点</p>
                        <p class="info-value">${student.personality}</p>
                    </div>
                    <div class="col-span-2">
                        <p class="info-label">兴趣爱好</p>
                        <p class="info-value">${student.hobbies}</p>
                    </div>
                </div>

                <!-- 联系方式 -->
                <div class="mb-8">
                    <h4 class="text-sm font-semibold text-gray-700 mb-4 flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                        联系方式
                    </h4>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                        ${student.wechat ? `
                        <a href="#" class="social-icon bg-green-50 hover:bg-green-100" title="微信：${student.wechat}">
                            ${getSocialIcon('wechat')}
                        </a>` : ''}
                        ${student.qq ? `
                        <a href="#" class="social-icon bg-blue-50 hover:bg-blue-100" title="QQ：${student.qq}">
                            ${getSocialIcon('qq')}
                        </a>` : ''}
                        ${student.email ? `
                        <a href="mailto:${student.email}" class="social-icon bg-gray-50 hover:bg-gray-100" title="邮箱：${student.email}">
                            ${getSocialIcon('email')}
                        </a>` : ''}
                        ${student.social ? `
                        <a href="#" class="social-icon bg-purple-50 hover:bg-purple-100" title="${student.social}">
                            ${getSocialIcon('other')}
                        </a>` : ''}
                    </div>
                    <div class="mt-3 text-xs text-gray-400 space-y-1">
                        ${student.wechat ? `<p>微信：${student.wechat}</p>` : ''}
                        ${student.qq ? `<p>QQ：${student.qq}</p>` : ''}
                        ${student.email ? `<p>邮箱：${student.email}</p>` : ''}
                        ${student.social ? `<p>${student.social}</p>` : ''}
                    </div>
                </div>

                <!-- 毕业感想 -->
                <div class="mb-6 p-4 bg-yellow-50 rounded-xl border border-yellow-100">
                    <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                        毕业感想
                    </h4>
                    <p class="text-gray-600 text-sm leading-relaxed italic">"${student.graduationThoughts}"</p>
                </div>

                <!-- 其他想说的话 -->
                ${student.otherWords ? `
                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        其他想说的话
                    </h4>
                    <p class="text-gray-600 text-sm leading-relaxed">${student.otherWords}</p>
                </div>
                ` : ''}
            `;

            detailModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            detailModal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 点击模态框外部关闭
        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) {
                closeModal();
            }
        });

        // ESC 键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && detailModal.classList.contains('active')) {
                closeModal();
            }
        });

        function filterStudents(category) {
            currentFilter = category;
            
            filterBtns.forEach(btn => {
                if (btn.dataset.filter === category) {
                    btn.classList.remove('text-gray-600', 'hover:bg-gray-100');
                    btn.classList.add('bg-gray-900', 'text-white');
                } else {
                    btn.classList.add('text-gray-600', 'hover:bg-gray-100');
                    btn.classList.remove('bg-gray-900', 'text-white');
                }
            });

            renderStudents();
        }

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            renderStudents();
        });

        renderStudents();

    </script>
</body>
</html>
